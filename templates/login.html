<!DOCTYPE html>
<html>
<head>
  <title>Login — WebScan</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #00e5ff;
      --accent: #ff2d6b;
      --bg: #060a0f;
      --surface: rgba(0, 229, 255, 0.04);
      --border: rgba(0, 229, 255, 0.2);
      --border-bright: rgba(0, 229, 255, 0.6);
      --text: #c8f0ff;
      --muted: rgba(0, 229, 255, 0.4);
      --safe: #00ff88;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      animation: gridPulse 4s ease-in-out infinite;
    }

    @keyframes gridPulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }

    .glow-tl, .glow-br {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
      filter: blur(80px);
    }
    .glow-tl { top: -100px; left: -100px; background: var(--primary); opacity: 0.1; }
    .glow-br { bottom: -100px; right: -100px; background: var(--accent); opacity: 0.1; }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 440px;
      padding: 48px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      animation: containerIn 0.6s ease-out both;
    }

    @keyframes containerIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container::before, .container::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border-color: var(--primary);
      border-style: solid;
    }
    .container::before { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .container::after  { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

    .header { margin-bottom: 36px; }

    .badge {
      display: inline-block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      border: 1px solid rgba(255, 45, 107, 0.4);
      padding: 3px 10px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 6px;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 6px;
    }

    h1 span { color: var(--primary); }

    .subtitulo {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
    }
    .divider span {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .input-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      background: rgba(0, 229, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--primary);
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.3s, box-shadow 0.3s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
    }

    input::placeholder { color: rgba(0, 229, 255, 0.2); }

    button {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 5px;
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color 0.3s;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--primary);
      transform: translateX(-101%);
      transition: transform 0.3s ease;
      z-index: 0;
    }

    button:hover::before { transform: translateX(0); }
    button:hover { color: var(--bg); }
    button span { position: relative; z-index: 1; }

    .flash-error {
      padding: 12px 16px;
      border: 1px solid var(--accent);
      background: rgba(255, 45, 107, 0.08);
      color: var(--accent);
      font-size: 12px;
      margin-bottom: 20px;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }

    .flash-error::before { content: '⚠ '; }

    .flash-success {
      padding: 12px 16px;
      border: 1px solid var(--safe);
      background: rgba(0, 255, 136, 0.08);
      color: var(--safe);
      font-size: 12px;
      margin-bottom: 20px;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }

    .flash-success::before { content: '✓ '; }

    .link-area {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    .link-area a {
      color: var(--primary);
      text-decoration: none;
      letter-spacing: 1px;
      transition: opacity 0.3s;
    }

    .link-area a:hover { opacity: 0.7; }

    .cursor {
      color: var(--accent);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .status-bar {
      margin-top: 28px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--safe);
      margin-right: 6px;
      box-shadow: 0 0 6px var(--safe);
      animation: blink 2s infinite;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>

  <div class="container">
    <div class="header">
      <div class="badge">▸ security tool v1.0</div>
      <h1>WEB<span>SCAN</span><span class="cursor">_</span></h1>
      <p class="subtitulo">[ INICIAR SESIÓN ]</p>
    </div>

    <div class="divider"><span>ACCESO</span></div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="input-label">// EMAIL</label>
      <input type="email" name="email" placeholder="usuario@gmail.com" required autocomplete="off">
      <label class="input-label">// CONTRASEÑA</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit"><span>▸ INGRESAR</span></button>
    </form>

    <div class="link-area">
      ¿No tienes cuenta? <a href="/register">Regístrate aquí</a>
    </div>

    <div class="status-bar">
      <span><span class="status-dot"></span>SISTEMA ACTIVO</span>
      <span id="clock"></span>
    </div>
  </div>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('es-PA', { hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    const grid = document.querySelector('.grid-bg');
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      grid.style.maskImage = `radial-gradient(ellipse 70% 70% at ${x}% ${y}%, black 40%, transparent 100%)`;
    });
  </script>

</body>
</html>
